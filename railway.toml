# aio-tools-frontend service — Root Directory: / (repo root)
[build]
buildCommand = "npm install && NEXT_PUBLIC_BACKEND_URL=https://aio-tools-backend-production.up.railway.app NEXT_PUBLIC_SITE_URL=https://aio-tools-frontend-production.up.railway.app BACKEND_URL=https://aio-tools-backend-production.up.railway.app npm run build"

[deploy]
startCommand = "bash scripts/start-frontend.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
