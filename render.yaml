# Render Blueprint — database + backend API + frontend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aio-tools-backend
    runtime: node
    buildCommand: npm install && npm run db:setup --workspace backend
    startCommand: bash scripts/start-backend.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aio-tools-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://utilitytools.in
      - key: PORT
        value: 10000

  - type: web
    name: aio-tools-frontend
    runtime: node
    buildCommand: >-
      npm install &&
      BACKEND_URL=https://aio-tools-backend.onrender.com
      NEXT_PUBLIC_BACKEND_URL=https://aio-tools-backend.onrender.com
      NEXT_PUBLIC_SITE_URL=https://utilitytools.in
      npm run build --workspace frontend
    startCommand: bash scripts/start-frontend.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        value: https://utilitytools.in
      - key: BACKEND_URL
        value: https://aio-tools-backend.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://aio-tools-backend.onrender.com

databases:
  - name: aio-tools-db
    plan: free
    databaseName: allinoneutilitytools
    user: pardeepkaushik
