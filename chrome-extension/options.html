<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UtilityTools Extension Settings</title>
  <style>
    :root {
      --bg: #fafafa;
      --card: #fff;
      --text: #0a0a0a;
      --muted: #737373;
      --border: rgba(0,0,0,.08);
      --accent: #6d28d9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px 40px;
    }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .sub { color: var(--muted); margin: 0 0 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    .hint { font-size: 12px; color: var(--muted); margin: 4px 0 10px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
    }
    .row { margin-bottom: 16px; }
    .row:last-child { margin-bottom: 0; }
    .actions { display: flex; gap: 10px; align-items: center; margin-top: 20px; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .status { font-size: 13px; color: #10b981; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>UtilityTools Extension</h1>
    <p class="sub">Configure how the extension opens tools and which site it uses.</p>

    <form id="settings-form" class="card">
      <div class="row">
        <label for="site-url">Website URL</label>
        <p class="hint">Base URL for opening tools. Default: https://utilitytools.in</p>
        <input id="site-url" type="url" placeholder="https://utilitytools.in" required />
      </div>

      <div class="row">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="row">
        <label>
          <input type="checkbox" id="open-new-tab" checked />
          Open tools in a new tab
        </label>
      </div>

      <div class="actions">
        <button type="submit">Save settings</button>
        <span class="status hidden" id="saved-msg">Saved!</span>
      </div>
    </form>

    <div class="card">
      <strong>Install tip</strong>
      <p class="hint" style="margin-top:8px">
        After updating tools on the website, run <code>npm run extension:build</code> in the repo
        and reload the extension in <code>chrome://extensions</code>.
      </p>
    </div>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
